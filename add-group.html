<!DOCTYPE html>
<html>
<head>
  <title>Add Group</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f5f5f5;
      display:flex;
    }

    .sidebar{
      width:200px;
      background:#1e40af;
      color:white;
      height:100vh;
      padding:20px;
      position:fixed;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      margin:10px 0;
      padding:6px;
      border-radius:5px;
    }

    .sidebar a.active{
      background:#2563eb;
    }

    .main{
      margin-left:220px;
      padding:20px;
      width:100%;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      width:300px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      padding:8px;
      margin:10px 0;
    }

    .btn{
      padding:8px 12px;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    .add{
      background:#2563eb;
      color:white;
    }

    #msg{
      margin-top:10px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Invoice</h3>
  <a href="index.html">Dashboard</a>
  <a href="add-group.html" class="active">Manage Groups</a>
  <a href="manage-change.html">Manage Chains</a>
  <a href="manage-brands.html">Manage Brands</a>
</div>

<!-- MAIN -->
<div class="main">

  <h2>Add Group</h2>

  <div class="card">
    <input id="group" placeholder="Enter Group Name">
    <button class="btn add" onclick="addGroup()">Add Group</button>
    <p id="msg"></p>
  </div>

</div>

<script>

const API = "http://localhost:5000";

async function addGroup(){

  const group_name = document.getElementById("group").value.trim();
  const msg = document.getElementById("msg");

  if(!group_name){
    msg.innerText = "⚠️ Please enter group name";
    msg.style.color = "red";
    return;
  }

  try{
    const res = await fetch(API + "/groups", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ group_name })
    });

    const data = await res.json();

    if(res.ok){
      msg.innerText = "✅ Group Added Successfully";
      msg.style.color = "green";
      document.getElementById("group").value = "";
    } else {
      msg.innerText = data.message || "Error occurred";
      msg.style.color = "red";
    }

  } catch(err){
    msg.innerText = "❌ Server not running";
    msg.style.color = "red";
    console.log(err);
  }
}

</script>

</body>
</html>
